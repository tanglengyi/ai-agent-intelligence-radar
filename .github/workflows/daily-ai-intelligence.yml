name: Daily AI Intelligence Radar

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-ai-intelligence-radar
  cancel-in-progress: false

jobs:
  collect-sync-and-observe:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
        working-directory: 自动化情报收集系统
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
      NOTION_COMPETITIVE_PARENT_PAGE_ID: ${{ secrets.NOTION_COMPETITIVE_PARENT_PAGE_ID }}
      RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run daily pipelines with operations logging
        run: python scripts/run_daily_ops.py --date today

      - name: Upload daily reports and operations logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-${{ github.run_id }}
          path: |
            自动化情报收集系统/data/reports/
            自动化情报收集系统/data/competitive_procurement/
            自动化情报收集系统/data/run_logs/
          if-no-files-found: warn
          retention-days: 30
