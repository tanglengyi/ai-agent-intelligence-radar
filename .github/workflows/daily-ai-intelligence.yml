name: Daily AI Intelligence Radar

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-ai-intelligence-radar
  cancel-in-progress: false

jobs:
  collect-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash
        working-directory: 自动化情报收集系统
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
      NOTION_COMPETITIVE_PARENT_PAGE_ID: ${{ secrets.NOTION_COMPETITIVE_PARENT_PAGE_ID }}
      RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run general intelligence pipeline
        run: |
          RSSHUB_BASE="${RSSHUB_BASE_URL:-https://rsshub.app}"
          args=(
            --date today
            --rsshub-base "$RSSHUB_BASE"
            --skip-low-stability
            --top-n 10
            --notion-event-limit 20
          )
          if [[ -n "${NOTION_DATABASE_ID:-}" ]]; then
            args+=(--notion-database-id "$NOTION_DATABASE_ID")
          fi
          if [[ -n "${NOTION_PARENT_PAGE_ID:-}" ]]; then
            args+=(--notion-parent-page-id "$NOTION_PARENT_PAGE_ID")
          fi
          python src/pipeline.py "${args[@]}"

      - name: Run competitive procurement radar
        run: |
          RSSHUB_BASE="${RSSHUB_BASE_URL:-https://rsshub.app}"
          args=(
            --date today
            --rsshub-base "$RSSHUB_BASE"
            --limit-per-source 5
            --top-n 20
          )
          if [[ -n "${NOTION_COMPETITIVE_PARENT_PAGE_ID:-}" ]]; then
            args+=(--notion-parent-page-id "$NOTION_COMPETITIVE_PARENT_PAGE_ID")
          elif [[ -n "${NOTION_PARENT_PAGE_ID:-}" ]]; then
            args+=(--notion-parent-page-id "$NOTION_PARENT_PAGE_ID")
          fi
          python src/competitive_procurement.py "${args[@]}"

      - name: Upload daily intelligence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-${{ github.run_id }}
          path: |
            自动化情报收集系统/data/reports/
            自动化情报收集系统/data/competitive_procurement/
          if-no-files-found: warn
          retention-days: 30
